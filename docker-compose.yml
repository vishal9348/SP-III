version: '3.8'
services:

  camunda:
    image: camunda/camunda-bpm-platform:7.20.0
    ports:
      - "8081:8080"
    environment:
      - DB_DRIVER=org.postgresql.Driver
      - DB_URL=jdbc:postgresql://host.docker.internal:3307/workflow  # Use your system PostgreSQL
      - DB_USERNAME=postgres
      - DB_PASSWORD=root
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows Docker to connect to your host system